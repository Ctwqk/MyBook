# ============================
# Docker Compose Configuration
# ============================
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mybook-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mybook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mybook-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/mybook
      APP_ENV: development
      LOG_LEVEL: INFO
    ports:
      - "8888:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mybook-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  # pgvector for vector search (optional)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: mybook-qdrant
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"

volumes:
  postgres_data:

networks:
  default:
    name: mybook-network
