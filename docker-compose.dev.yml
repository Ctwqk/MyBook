# ============================
# Development Docker Compose
# ============================
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mybook-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mybook
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mybook-backend-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/mybook
      LLM_PROVIDER: mock
      APP_ENV: development
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: mybook-frontend-dev
    working_dir: /app
    environment:
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_dev_data:

networks:
  default:
    name: mybook-dev-network
